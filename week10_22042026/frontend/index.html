<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Full Stack User Management App</title>
    <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
    <div id="app" class="container">
        <header class="header">
            <h1>👥 User Management System</h1>
            <p class="subtitle">A Full Stack Demo with Node.js, Express, MongoDB & Vite</p>
        </header>

        <main class="main-content">
            <!-- Add User Form Section -->
            <section class="form-section">
                <h2>Add New User</h2>
                <form id="userForm" class="user-form">
                    <div class="form-group">
                        <label for="nameInput">Name:</label>
                        <input
                            type="text"
                            id="nameInput"
                            placeholder="Enter your full name"
                            required
                        />
                    </div>

                    <div class="form-group">
                        <label for="emailInput">Email:</label>
                        <input
                            type="email"
                            id="emailInput"
                            placeholder="Enter your email address"
                            required
                        />
                    </div>

                    <button type="submit" class="btn btn-primary">Add User</button>
                </form>

                <!-- Status Messages -->
                <div id="statusMessage" class="status-message"></div>
            </section>

            <!-- Users List Section -->
            <section class="users-section">
                <h2>Registered Users</h2>
                <div id="usersContainer" class="users-container">
                    <p class="loading">Loading users...</p>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>📚 Full Stack Project • Node.js • Express • MongoDB • Vite</p>
        </footer>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
